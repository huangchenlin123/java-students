<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>学生管理系统 - 登录</title>
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .login-card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.3); }
        .login-card .card-header { background: transparent; border-bottom: none; padding-bottom: 0; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-5 col-lg-4">

            <div class="card login-card">
                <div class="card-header text-center pt-4">
                    <h2 class="fw-bold">🎓 学生管理系统</h2>
                    <p class="text-muted small">请登录以继续</p>
                </div>
                <div class="card-body p-4">

                    <!-- 错误提示 -->
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form action="/login" method="post">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" name="username" class="form-control form-control-lg"
                                   placeholder="请输入用户名" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">密码</label>
                            <input type="password" name="password" class="form-control form-control-lg"
                                   placeholder="请输入密码" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">登 录</button>
                        </div>
                        <div class="text-center mt-3">
                            <small class="text-muted">默认账号: admin / 123456</small>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
