<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${isEdit} ? '编辑学生' : '添加学生'">学生表单</title>
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container">
        <a href="/menu" class="navbar-brand mb-0 h1">🎓 学生管理系统</a>
        <div class="d-flex align-items-center gap-3">
            <a href="/students/page" class="btn btn-outline-secondary btn-sm">← 返回列表</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">退出</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- 标题 -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h4" th:text="${isEdit} ? '✏️ 编辑学生' : '➕ 添加学生'">表单</h1>
            </div>

            <!-- 表单卡片 -->
            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <form th:action="@{/students/page/save}" method="post"
                          th:object="${student}">

                        <!-- 隐藏 ID（编辑时使用） -->
                        <input type="hidden" th:field="*{id}" th:value="${student.id}">

                        <!-- 姓名 -->
                        <div class="mb-3">
                            <label class="form-label">姓名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{name}"
                                   placeholder="请输入学生姓名" required>
                        </div>

                        <!-- 年龄 -->
                        <div class="mb-3">
                            <label class="form-label">年龄 <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" th:field="*{age}"
                                   min="1" max="150" placeholder="请输入年龄" required>
                        </div>

                        <!-- 性别 -->
                        <div class="mb-4">
                            <label class="form-label">性别 <span class="text-danger">*</span></label>
                            <div class="d-flex gap-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{sex}"
                                           th:value="男" id="sexMale">
                                    <label class="form-check-label" for="sexMale">男</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{sex}"
                                           th:value="女" id="sexFemale">
                                    <label class="form-check-label" for="sexFemale">女</label>
                                </div>
                            </div>
                        </div>

                        <!-- 提交按钮 -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg"
                                    th:text="${isEdit} ? '保存修改' : '确认添加'">提交</button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
